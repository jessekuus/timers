<!DOCTYPE html>
<html>
<head>
    <title>FBJJF Open Class Registration</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: white; padding: 20px; margin: 0; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1600px; margin: 0 auto 30px auto; border-bottom: 2px solid #333; padding-bottom: 15px;
        }

        .fed-logo { height: 100px; width: auto; }

        h1 { 
            text-align: right; font-size: 2.5rem; text-transform: uppercase; 
            letter-spacing: 2px; margin: 0; color: #fff; flex-grow: 1; padding-left: 20px;
        }
        
        .admin-toggle {
            display: block; margin: 0 auto 30px auto; background: #333; color: #aaa; border: 1px solid #444; 
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9rem;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .timer-card { 
            background: #1e1e1e; padding: 25px; border-radius: 12px; 
            border-bottom: 12px solid #444; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Belt Styling */
        .white { border-color: #ffffff; }
        .blue { border-color: #2b59ff; }
        .purple { border-color: #800080; }
        .brown-black { border-color: #4a3321; }

        .category { font-size: 0.8rem; text-transform: uppercase; color: #888; letter-spacing: 1px; margin-bottom: 5px; }
        .division-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        
        .time-display { font-size: 4.5rem; font-weight: bold; margin: 5px 0; font-family: 'Courier New', Courier, monospace; line-height: 1; }
        
        /* The new static deadline display */
        .deadline-label { font-size: 1.2rem; color: #aaa; margin-top: 10px; font-weight: 500; }
        .deadline-time { color: #fff; font-weight: bold; border-bottom: 1px dashed #444; }

        .admin-section { background: #2a2a2a; margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        input[type="time"] { width: 100%; padding: 10px; font-size: 1.2rem; border-radius: 4px; border: none; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #aaa; text-align: left; }
    </style>
</head>
<body>

    <header>
        <img src="https://bjjliitto.fi/vir_tied/SBJJL%20Logo.png" alt="FBJJF Logo" class="fed-logo">
        <h1>Open class registration</h1>
    </header>
    
    <button class="admin-toggle" onclick="toggleAdmin()">⚙️ Edit Deadlines</button>

    <div class="grid" id="timer-grid">
        </div>

    <script>
        const divisions = [
    { id: 'm-white', label: 'Male / White belts Open', class: 'white' },
    { id: 'm-blue', label: 'Male / Blue belts Open', class: 'blue' },
    { id: 'm-purple', label: 'Male / Purple belts Open', class: 'purple' },
    { id: 'm-pro', label: 'Male / Brown/Black belts Open', class: 'brown-black' },
    { id: 'f-white', label: 'Female / White belts Open', class: 'white' },
    { id: 'f-blue', label: 'Female / Blue belts Open', class: 'blue' },
    { id: 'f-pro', label: 'Female / Purple/Brown/Black belts Open', class: 'brown-black' }
];

const grid = document.getElementById('timer-grid');
divisions.forEach(div => {
    grid.innerHTML += `
        <div class="timer-card ${div.class}">
            <div class="category">${div.label.split(' / ')[0]}</div>
            <div class="division-name">${div.label.split(' / ')[1]}</div>
            <div id="${div.id}-timer" class="time-display">00:00:00</div>
            <div class="deadline-label">Closes at: <span id="${div.id}-deadline-text" class="deadline-time">--:--</span></div>
            <div class="admin-section">
                <label>Change Deadline:</label>
                <input type="time" id="${div.id}-input" onchange="saveTime('${div.id}', this.value)">
            </div>
        </div>
    `;
});

function loadSavedTimes() {
    divisions.forEach(div => {
        const savedValue = localStorage.getItem(`${div.id}-deadline`);
        const val = savedValue || "12:00";
        document.getElementById(`${div.id}-input`).value = val;
        document.getElementById(`${div.id}-deadline-text`).innerText = val;
    });
}

function saveTime(id, value) {
    localStorage.setItem(`${id}-deadline`, value);
    document.getElementById(`${id}-deadline-text`).innerText = value;
    updateTimers(); 
}

// NEW PASSWORD PROTECTED TOGGLE
function toggleAdmin() {
    const pw = prompt("Enter Admin Password to Edit:");
    if (pw === "oss") { // Change "oss" to your preferred password
        const panels = document.querySelectorAll('.admin-section');
        const isCurrentlyVisible = panels[0].style.display === 'block';
        panels.forEach(p => p.style.display = isCurrentlyVisible ? 'none' : 'block');
    } else if (pw !== null) {
        alert("Incorrect password.");
    }
}

function updateTimers() {
    const now = new Date();
    divisions.forEach(div => {
        const inputVal = document.getElementById(`${div.id}-input`).value;
        const [hours, minutes] = inputVal.split(':');
        const deadline = new Date();
        deadline.setHours(hours, minutes, 0);

        const diff = deadline - now;
        const display = document.getElementById(`${div.id}-timer`);

        if (diff <= 0) {
            display.innerHTML = "CLOSED";
            display.style.color = "#ff4444";
        } else {
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            display.innerHTML = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            display.style.color = "#00ff00";
        }
    });
}

loadSavedTimes();
setInterval(updateTimers, 1000);
updateTimers();
    </script>
</body>
</html>
